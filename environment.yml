name: mbctd

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - llvm-openmp
  - intel-openmp

  # PyTorch - install manually to match your CUDA version, e.g.:
  # conda install pytorch torchvision pytorch-cuda=12.1 -c pytorch -c nvidia

  - numpy>=1.24.0
  - pip
  - pip:
      - timm>=1.0.0
      - albumentations>=1.3.0
      - Pillow>=10.0.0
      - gradio>=4.0.0
